name: rebobinai

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rebobinai
      POSTGRES_PASSWORD: rebobinai
      POSTGRES_DB: rebobinai
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rebobinai -d rebobinai']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
