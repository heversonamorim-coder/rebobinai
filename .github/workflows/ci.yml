name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Impede o merge de um branch defasado da base (foi o que aconteceu no
  # f7471b5: um branch criado antes do #58 reverteu a feature ao ser mergeado).
  # Falha quando o topo atual da base NÃO está contido no branch do PR — ou
  # seja, exige "branch atualizado antes de mergear". Marque este check como
  # obrigatório na proteção de branch de `main` para virar um bloqueio de merge.
  base-atualizada:
    name: Base atualizada
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Branch contém o topo da base?
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          if git merge-base --is-ancestor "origin/$BASE_REF" "$HEAD_SHA"; then
            echo "OK: o branch já contém o topo atual de $BASE_REF."
          else
            echo "::error::Branch defasado — há commits em '$BASE_REF' que não estão neste PR. Mergear assim pode reverter código mais novo (foi o caso do f7471b5)."
            echo "Como resolver: clique em \"Update branch\" no PR, ou rode:"
            echo "  git fetch origin $BASE_REF && git rebase origin/$BASE_REF && git push --force-with-lease"
            exit 1
          fi

  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # versão vem do packageManager no package.json raiz

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Gerar Prisma Client
        run: pnpm --filter @rebobinai/api prisma:generate

      - name: Cache do Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Lint · Test · Build
        run: pnpm turbo run lint test build --cache-dir=.turbo
